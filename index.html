<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lily's Farm</title>
<style>

body{background:#222;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100vw;height:100vh}

<body>
<canvas id="c"></canvas>
<div id="nameOverlay" style="position:fixed;inset:0;display:none;z-index:999;
  background:rgba(0,0,0,0.7);flex-direction:column;align-items:center;justify-content:center;gap:12px">
  <div style="background:#4e342e;padding:28px 36px;border-radius:16px;border:3px solid #8d6e63;
    display:flex;flex-direction:column;align-items:center;gap:16px;width:300px">
    <div style="font-size:22px;font-weight:bold;color:#ffcc80;font-family:inherit">🌾 Lily's Farm 🌾</div>
    <div style="font-size:14px;color:#fff">What's your name, farmer?</div>
    <input id="nameIn" type="text" maxlength="15" placeholder="Your name..." autocomplete="off"
      style="width:100%;height:44px;font-size:18px;text-align:center;border:2px solid #fdd835;
      background:#3e2723;color:#fff;border-radius:8px;outline:none;font-family:inherit">

      background:#4caf50;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;
      margin-top:4px">START!</button>
  </div>

<script>
const C=document.getElementById('c'),G=C.getContext('2d');
let W,H;
function resize(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;C.width=W*d;C.height=H*d;G.setTransform(d,0,0,d,0,0)}
resize();addEventListener('resize',resize);

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const lerp=(a,b,t)=>a+(b-a)*Math.min(1,t);
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndInt=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const pick=a=>a[rndInt(0,a.length-1)];

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
let actx;
const au=()=>{if(!actx)actx=new(AudioContext||webkitAudioContext)();return actx};
function sfx(freq,freq2,dur,type='sine',vol=.15){
  const c=au(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq2,t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur);
}
const sfxCollect=()=>sfx(600+Math.random()*400,1200,.1);
const sfxSell=()=>sfx(800,1600,.12,'triangle',.2);
const sfxCoin=()=>{sfx(1400,1400,.15);sfx(1800,1800,.15,'sine',.08)};
const sfxUnlock=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,f,.3,'triangle',.12),i*100))};

// ═══════════════════════════════════════
// TIER CONFIG — the entire game tree
// ═══════════════════════════════════════
const TIERS=[
  {id:'chicken',name:'Chicken Coop',animal:'🐔',animalName:'Chicken',
   product:'🥚',prodName:'Egg',value:8,unlockCost:0,
   startN:2,maxN:8,animalCost:60,feedMax:10,feedDrain:.8,
   prodInterval:1.8,maxProd:25,custInterval:3,custPatience:15,
   animalSpeed:25,penW:220,penH:200},
  {id:'duck',name:'Duck Pond',animal:'🦆',animalName:'Duck',
   product:'🪺',prodName:'Nest Egg',value:15,unlockCost:150,
   startN:2,maxN:7,animalCost:80,feedMax:12,feedDrain:.7,
   prodInterval:2.2,maxProd:20,custInterval:3,custPatience:14,
   animalSpeed:22,penW:220,penH:200},
  {id:'cow',name:'Cow Pasture',animal:'🐄',animalName:'Cow',
   product:'🥛',prodName:'Milk',value:25,unlockCost:400,
   startN:2,maxN:6,animalCost:150,feedMax:15,feedDrain:.5,
   prodInterval:3.5,maxProd:15,custInterval:4,custPatience:12,
   animalSpeed:15,penW:240,penH:200},
  {id:'pig',name:'Pig Pen',animal:'🐷',animalName:'Pig',
   product:'🥓',prodName:'Bacon',value:45,unlockCost:1200,
   startN:2,maxN:5,animalCost:300,feedMax:20,feedDrain:.4,
   prodInterval:4,maxProd:12,custInterval:5,custPatience:10,
   animalSpeed:20,penW:240,penH:200},
  {id:'goat',name:'Goat Yard',animal:'🐐',animalName:'Goat',
   product:'🧀',prodName:'Cheese',value:60,unlockCost:3000,
   startN:2,maxN:5,animalCost:400,feedMax:22,feedDrain:.35,
   prodInterval:4.5,maxProd:10,custInterval:5,custPatience:10,
   animalSpeed:22,penW:230,penH:200},
  {id:'sheep',name:'Sheep Farm',animal:'🐑',animalName:'Sheep',
   product:'🧶',prodName:'Wool',value:80,unlockCost:6000,
   startN:2,maxN:5,animalCost:500,feedMax:25,feedDrain:.3,
   prodInterval:5,maxProd:10,custInterval:6,custPatience:10,
   animalSpeed:18,penW:240,penH:200},
  {id:'bee',name:'Bee Hive',animal:'🐝',animalName:'Bee',
   product:'🍯',prodName:'Honey',value:120,unlockCost:12000,
   startN:3,maxN:10,animalCost:400,feedMax:30,feedDrain:.25,
   prodInterval:6,maxProd:8,custInterval:7,custPatience:8,
   animalSpeed:35,penW:200,penH:180},
  {id:'flamingo',name:'Flamingo Lagoon',animal:'🦩',animalName:'Flamingo',
   product:'🪶',prodName:'Feather',value:200,unlockCost:25000,
   startN:2,maxN:6,animalCost:800,feedMax:35,feedDrain:.2,
   prodInterval:7,maxProd:6,custInterval:8,custPatience:8,
   animalSpeed:20,penW:240,penH:200},
];

// ═══════════════════════════════════════
// PRESTIGE — persists across resets
// ═══════════════════════════════════════
let prestigeStars=0; // permanent multiplier
let prestigeLifetimeEarned=0; // tracks total across all runs
const PRESTIGE_THRESHOLD=5000; // first prestige at 5k earned
const PRESTIGE_MULT=1.8; // each prestige needs 1.8x more
const HAT_COLORS=['#fdd835','#e91e63','#4caf50','#2196f3','#ff9800','#9c27b0','#f44336','#00bcd4','#ff5722','#795548'];
function prestigeBonus(){return 1+prestigeStars*0.25;} // +25% per star
function prestigeCost(){return Math.floor(PRESTIGE_THRESHOLD*Math.pow(PRESTIGE_MULT,prestigeStars));}
function lilyHat(){return HAT_COLORS[prestigeStars%HAT_COLORS.length];}
let showPrestigeBtn=false;

// ═══════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════
// Leaderboard via Cloudflare Worker + KV
const LB_URL='https://lilys-farm-leaderboard.chezkie.workers.dev';
let playerName=localStorage.getItem('lilys_farm_name')||'';
let leaderboard=[];
let lbExpanded=false;
let lbTimer=0;
const LB_REFRESH=120;
let showNamePrompt=!playerName;
let nameInput='';

function fetchLeaderboard(){
  fetch(LB_URL+'/leaderboard')
    .then(r=>r.json()).then(d=>{leaderboard=Array.isArray(d)?d:[];}).catch(()=>{});
}

function pushStats(){
  if(!playerName)return;
  fetch(LB_URL+'/update',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:playerName,prestige:prestigeStars,totalEarned,
      tiersUnlocked:activeTiers.length,lifetimeEarned:prestigeLifetimeEarned+totalEarned})
  }).then(()=>fetchLeaderboard()).catch(()=>{});
}

// Initial fetch
if(playerName)setTimeout(fetchLeaderboard,500);

// ═══════════════════════════════════════
// GAME STATE (resets on prestige)
// ═══════════════════════════════════════
let coins=0,totalEarned=0,speedLvl=0,carryLvl=0,wheatLvl=0;
const isTouchDevice='ontouchstart' in window;
let camX=0,camY=0,targetX=350,targetY=250;
let camZoom=isTouchDevice?0.7:1;
const CAM_ZOOM_MAX=1.2;
function camZoomMin(){
  // Calculate zoom needed to fit entire farm on screen
  const b=getWorldBounds();
  const farmW=b.x2-b.x1+100, farmH=b.y2-b.y1+100;
  const fitZoom=Math.min(W/farmW, H/farmH);
  return Math.min(0.35, fitZoom); // never more than 0.35, but can go lower for big farms
}
let pinchDist=0;
let floats=[],flies=[];

// Player
const lily={x:350,y:250,dir:0,wf:0,stack:[],
  carry(){return this.stack.length},
  maxC(){return 5+carryLvl*3}};

// Wheat
let wheat={x:50,y:130,w:220,h:180,tiles:[],regrow:3};
function initWheat(){
  wheat.tiles=[];wheat.w=220;wheat.h=180;
  for(let r=0;r<3;r++)for(let c=0;c<4;c++)
    wheat.tiles.push({x:wheat.x+25+c*52,y:wheat.y+25+r*52,grown:true,timer:0});
}
initWheat();

// Active tiers (runtime state for each unlocked tier)
let activeTiers=[]; // {tier, pen, booth, animals, products, pads, workers, feedLevel, feedTimer, prodTimer, custTimer}

// All world pads
let allPads=[];

// ═══════════════════════════════════════
// SAVE / LOAD — localStorage
// ═══════════════════════════════════════
const SAVE_KEY='lilys_farm_save';
const SAVE_INTERVAL=5; // seconds
let saveTimer=0;

let lastSaveOk=false;
let saveFlash=0; // visual indicator

function saveGame(){
  const data={
    v:2,
    coins, totalEarned, speedLvl, carryLvl, wheatLvl,
    prestigeStars, prestigeLifetimeEarned,
    wheatTileCount:wheat.tiles.length,
    playerName,
    tiers:activeTiers.map(ts=>({
      idx:ts.tierIdx,
      feedLevel:ts.feedLevel,
      animalCount:ts.animals.length,
      workerTypes:ts.workers.map(w=>w.type),
      workerSpeeds:ts.workers.map(w=>w.speed),
      workerStacks:ts.workers.map(w=>w.maxStack),
    })),
  };
  const json=JSON.stringify(data);
  try{
    localStorage.setItem(SAVE_KEY,json);
    // Verify it actually saved
    const check=localStorage.getItem(SAVE_KEY);
    lastSaveOk=check===json;
  }catch(e){lastSaveOk=false;}
  saveFlash=1;
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(!d||d.v<2)return false;

    prestigeStars=d.prestigeStars||0;
    prestigeLifetimeEarned=d.prestigeLifetimeEarned||0;
    coins=d.coins||0;
    totalEarned=d.totalEarned||0;
    speedLvl=d.speedLvl||0;
    carryLvl=d.carryLvl||0;
    wheatLvl=d.wheatLvl||0;
    // Restore player name from save if not in localStorage
    if(d.playerName&&!playerName){
      playerName=d.playerName;
      localStorage.setItem('lilys_farm_name',playerName);
    }

    // Rebuild wheat
    initWheat();
    const extraRows=Math.floor((d.wheatTileCount-12)/4);
    for(let r=0;r<extraRows;r++){
      const row=3+r;
      for(let c=0;c<4;c++)wheat.tiles.push({x:wheat.x+25+c*52,y:wheat.y+25+row*52,grown:true,timer:0});
      wheat.h+=52;
    }

    // Rebuild tiers
    activeTiers=[];allPads=[];
    placedPadPositions.length=0;
    rebuildGlobalPads();
    d.tiers.forEach(td=>{
      activateTier(td.idx);
      const ts=activeTiers[activeTiers.length-1];
      ts.feedLevel=td.feedLevel||0;
      // Add extra animals
      while(ts.animals.length<td.animalCount){
        ts.animals.push({x:rnd(ts.pen.x+30,ts.pen.x+ts.pen.w-30),y:rnd(ts.pen.y+30,ts.pen.y+ts.pen.h-60),tx:0,ty:0,timer:rnd(0,3)});
      }
      // Recreate workers
      td.workerTypes.forEach((wt,i)=>{
        // Map old 'collector' saves to 'feeder'
        const type=wt==='collector'?'feeder':wt;
        const hx=type==='seller'?ts.booth.x:ts.feederX+30;
        const hy=type==='seller'?ts.booth.y+35:ts.feederY+30;
        const w=mkWorker(type,hx,hy,ts);
        w.speed=td.workerSpeeds[i]||90;
        w.maxStack=td.workerStacks[i]||6;
        ts.workers.push(w);
      });
    });
    markNextTier();
    return true;
  }catch(e){return false;}
}

// ═══════════════════════════════════════
// PRESTIGE — reset for permanent bonus
// ═══════════════════════════════════════
function doPrestige(){
  prestigeStars++;
  prestigeLifetimeEarned+=totalEarned;

  // Reset game state
  coins=0;totalEarned=0;speedLvl=0;carryLvl=0;wheatLvl=0;
  lily.x=350;lily.y=250;lily.stack=[];lily.dir=0;lily.wf=0;
  targetX=350;targetY=250;camX=0;camY=0;
  floats=[];flies=[];showPrestigeBtn=false;

  // Reset wheat
  initWheat();

  // Reset tiers and pads
  activeTiers=[];
  allPads=[];
  placedPadPositions.length=0;
  rebuildGlobalPads();
  activateTier(0);
  markNextTier();

  saveGame();
  pushStats();
  sfxUnlock();
  floats.push({x:lily.x,y:lily.y-40,text:`⭐ Prestige ${prestigeStars}! +25% bonus!`,t:3,color:'#fdd835'});
}

function rebuildGlobalPads(){
  globalPads.length=0;
  globalPads.push(
    mkPad(10,wheat.y+wheat.h+20,'👟','Speed',Math.floor(50*Math.pow(1.5,speedLvl)),()=>{speedLvl++;globalPads[0].paid=0;globalPads[0].cost=Math.floor(50*Math.pow(1.5,speedLvl))},true,0,10),
    mkPad(10,wheat.y+wheat.h+100,'📦','Carry',Math.floor(40*Math.pow(1.5,carryLvl)),()=>{carryLvl++;globalPads[1].paid=0;globalPads[1].cost=Math.floor(40*Math.pow(1.5,carryLvl))},true,0,8),
    mkPad(10,wheat.y+wheat.h+180,'⚡','Fast Wheat',Math.floor(120*Math.pow(1.6,wheatLvl)),()=>{wheatLvl++;globalPads[2].paid=0;globalPads[2].cost=Math.floor(120*Math.pow(1.6,wheatLvl))},true,0,5),
    mkPad(wheat.x+wheat.w+20,wheat.y+wheat.h+20,'🌾','+Wheat',80,(p)=>{
      const row=Math.floor(wheat.tiles.length/4);
      for(let c=0;c<4;c++)wheat.tiles.push({x:wheat.x+25+c*52,y:wheat.y+25+row*52,grown:true,timer:0});
      wheat.h+=52;p.y+=52;p.paid=0;p.cost=Math.floor(p.cost*1.5);
    },true,0,4),
  );
}

// ═══════════════════════════════════════
// LAYOUT — positions tiers on the map
// ═══════════════════════════════════════
function tierPos(idx){
  // Layout: wheat on far left, highway, then pens+booths to the right
  // Plenty of space between highway and pens for pads
  return {
    penX: 500,
    penY: 100 + idx * 320,
    boothX: 850,
    boothY: 130 + idx * 320,
  };
}

// ═══════════════════════════════════════
// ACTIVATION — unlock a tier
// ═══════════════════════════════════════
function activateTier(tierIdx){
  const cfg=TIERS[tierIdx];
  const pos=tierPos(tierIdx);

  const pen={x:pos.penX,y:pos.penY,w:cfg.penW,h:cfg.penH};
  const feederX=pen.x, feederY=pen.y+pen.h-20;
  const booth={x:pos.boothX,y:pos.boothY,customers:[],custTimer:0};

  const animals=[];
  for(let i=0;i<cfg.startN;i++)
    animals.push({x:rnd(pen.x+30,pen.x+pen.w-30),y:rnd(pen.y+30,pen.y+pen.h-60),tx:0,ty:0,timer:rnd(0,3)});

  const state={
    tier:cfg, tierIdx, pen, booth, animals,
    products:[], // items on ground
    workers:[], // {type:'collector'|'seller', ...worker state}
    feedLevel:tierIdx===0?0:0,
    feedMax:cfg.feedMax,
    feederX, feederY,
    prodTimer:0, custTimer:0,
    pads:[], // local pads for this tier
  };

  // Add tier to activeTiers BEFORE creating pads so collision detection sees this pen
  state.pads=[];
  activeTiers.push(state);

  // Create upgrade pads for this tier — spread around pen and booth
  const px=pen.x, py=pen.y, bx=booth.x, by=booth.y;
  const pads=[];

  // Zone between highway (380) and pen (500): feeder & animal pads
  const midX=420; // between highway and pen

  // More animals
  pads.push(mkPad(midX,py,cfg.animal,`+1 ${cfg.animalName}`,cfg.animalCost,
    (p)=>{
      state.animals.push({x:rnd(pen.x+30,pen.x+pen.w-30),y:rnd(pen.y+30,pen.y+pen.h-60),tx:0,ty:0,timer:0});
      if(state.animals.length>=cfg.maxN)p.done=true;
      else{p.paid=0;p.cost=Math.floor(p.cost*1.4);}
    },true,0,cfg.maxN-cfg.startN));

  // Feeder worker — between highway and pen, lower
  pads.push(mkPad(midX,py+90,'🧑‍🌾','Feeder',200+tierIdx*100,
    (p)=>{
      p.done=true;
      const w=mkWorker('feeder',state.feederX+30,state.feederY+30,state);
      state.workers.push(w);
      pads.push(mkPad(midX,py+170,'⚡','F.Speed',80,(p2)=>{
        w.speed+=20;p2.paid=0;p2.cost=Math.floor(p2.cost*1.6);
      },true,0,5));
      pads.push(mkPad(midX,py+240,'📦','F.Carry',100,(p2)=>{
        w.maxStack+=3;p2.paid=0;p2.cost=Math.floor(p2.cost*1.5);
      },true,0,4));
      rebuildPads();
    }));

  // Seller worker — right of booth
  pads.push(mkPad(bx+60,by,'🧑‍💼','Seller',250+tierIdx*120,
    (p)=>{
      p.done=true;
      const w=mkWorker('seller',bx,by+35,state);
      state.workers.push(w);
      pads.push(mkPad(bx+60,by+80,'⚡','S.Speed',80,(p2)=>{
        w.speed+=20;p2.paid=0;p2.cost=Math.floor(p2.cost*1.6);
      },true,0,5));
      pads.push(mkPad(bx+60,by+150,'📦','S.Carry',100,(p2)=>{
        w.maxStack+=3;p2.paid=0;p2.cost=Math.floor(p2.cost*1.5);
      },true,0,4));
      rebuildPads();
    }));

  state.pads=pads;

  // Unlock pad for NEXT tier — centered between current and next row
  if(tierIdx+1<TIERS.length){
    const next=TIERS[tierIdx+1];
    const curY=pos.penY;
    const nextY=curY + 300; // matches tierPos spacing
    const unlockY=curY + pen.h + 50;
    const p=mkPad(pen.x+60, unlockY, next.animal,next.name,next.unlockCost,
      ()=>activateTier(tierIdx+1),false,0,0,52);
    p._isNextTier=true;
    allPads.push(p);
  }

  rebuildPads();
}

function mkPad(x,y,icon,label,cost,action,repeatable,level,maxLevel,size){
  // Auto-nudge away from paths
  const safe=safePadPos(x,y);
  return {x:safe.x,y:safe.y,icon,label,cost,paid:0,done:false,action,
    repeatable:!!repeatable,level:level||0,maxLevel:maxLevel||99,size:size||40,
    hoverTime:0}; // must hover 2s before coins drain
}

function mkWorker(type,hx,hy,tierState){
  return {x:hx,y:hy,tx:hx,ty:hy,homeX:hx,homeY:hy,
    speed:90,maxStack:6,stack:[],state:'idle',
    type,tierState,dir:0,wf:0,timer:0,sellTimer:0};
}

function rebuildPads(){
  const gp=[];
  gp.push(...globalPads);
  activeTiers.forEach(s=>gp.push(...s.pads));
  allPads=gp.concat(allPads.filter(p=>p._isNextTier));
  revalidateAllPads();
}

// Global upgrade pads (rebuilt dynamically)
const globalPads=[];

function markNextTier(){
  allPads.forEach(p=>{if(!globalPads.includes(p)&&!activeTiers.some(s=>s.pads.includes(p)))p._isNextTier=true});
}

// Highway X position — centered between wheat field and pens
const HW_X=380;

// Path rectangles for collision — pads should not overlap these
function getPathRects(){
  const rects=[];
  const P=30;
  const wheatMidY=wheat.y+wheat.h/2;

  if(activeTiers.length>0){
    // Vertical highway full extent
    let topY=wheatMidY, botY=wheatMidY;
    activeTiers.forEach(ts=>{topY=Math.min(topY,ts.feederY);botY=Math.max(botY,ts.feederY);});
    rects.push({x:HW_X-P,y:topY-P,w:P*2,h:botY-topY+P*3});
  }
  // Wheat to highway
  rects.push({x:wheat.x+wheat.w-10,y:wheatMidY-P,w:HW_X-wheat.x-wheat.w+P+10,h:P*2});
  // Per-tier paths
  activeTiers.forEach(ts=>{
    rects.push({x:HW_X-P,y:ts.feederY-P,w:ts.feederX-HW_X+P*2,h:P*2}); // highway to feeder
    const pathY=ts.pen.y+ts.pen.h/2;
    rects.push({x:ts.pen.x+ts.pen.w-10,y:pathY-P,w:ts.booth.x-ts.pen.x-ts.pen.w+20,h:P*2}); // pen to booth
  });
  return rects;
}

function padOverlapsPath(px,py){
  const padR=40;
  // Check paths
  if(getPathRects().some(r=>
    px+padR>r.x && px<r.x+r.w+padR && py+padR>r.y && py<r.y+r.h+padR
  )) return true;
  // Check pens, booths, feeders, wheat field
  const zones=[{x:wheat.x-10,y:wheat.y-10,w:wheat.w+20,h:wheat.h+20}];
  activeTiers.forEach(ts=>{
    zones.push({x:ts.pen.x-10,y:ts.pen.y-10,w:ts.pen.w+20,h:ts.pen.h+20}); // pen
    zones.push({x:ts.booth.x-35,y:ts.booth.y-30,w:70,h:80}); // booth
    zones.push({x:ts.feederX-10,y:ts.feederY-20,w:80,h:50}); // feeder
  });
  return zones.some(r=>
    px+padR>r.x && px<r.x+r.w+padR && py+padR>r.y && py<r.y+r.h+padR
  );
}

// Track all placed pad positions for overlap detection
let placedPadPositions=[];

function padOverlapsPad(x,y,ignorePad){
  const PAD_SIZE=80;
  return placedPadPositions.some(p=>
    p!==ignorePad && Math.abs(x-p.x)<PAD_SIZE && Math.abs(y-p.y)<PAD_SIZE
  );
}

// Find a free spot starting from (x,y), spiraling outward
function findFreeSpot(x,y,ignorePad){
  if(!padOverlapsPath(x,y)&&!padOverlapsPad(x,y,ignorePad)) return{x,y};
  for(let dist=80;dist<=600;dist+=70){
    for(const [dx,dy] of [[0,-dist],[dist,0],[0,dist],[-dist,0],
        [dist,-dist],[-dist,-dist],[dist,dist],[-dist,dist],
        [dist/2,-dist],[dist,dist/2],[-dist/2,dist],[-dist,-dist/2]]){
      const nx=x+dx,ny=y+dy;
      if(!padOverlapsPath(nx,ny)&&!padOverlapsPad(nx,ny,ignorePad)) return{x:nx,y:ny};
    }
  }
  return{x,y};
}

// Place a new pad at a safe position
function safePadPos(x,y){
  const pos=findFreeSpot(x,y);
  placedPadPositions.push({x:pos.x,y:pos.y});
  return pos;
}

// Revalidate ALL pads — move any that now overlap new pens/paths/zones
function revalidateAllPads(){
  placedPadPositions=[];
  allPads.forEach(pad=>{
    if(pad.done)return;
    // Check if current position is still valid
    if(padOverlapsPath(pad.x,pad.y)){
      const pos=findFreeSpot(pad.x,pad.y);
      pad.x=pos.x;pad.y=pos.y;
    }
    // Check overlap with other placed pads
    if(padOverlapsPad(pad.x,pad.y)){
      const pos=findFreeSpot(pad.x,pad.y);
      pad.x=pos.x;pad.y=pos.y;
    }
    placedPadPositions.push({x:pad.x,y:pad.y});
  });
}

// ═══════════════════════════════════════
// WORKER AI
// ═══════════════════════════════════════
function moveTo(w,x,y,dt){
  const dx=x-w.x,dy=y-w.y,d=Math.hypot(dx,dy);
  if(d>5){w.x+=(dx/d)*w.speed*dt;w.y+=(dy/d)*w.speed*dt;w.wf+=dt*8;
    if(Math.abs(dx)>Math.abs(dy))w.dir=dx>0?3:1;else w.dir=dy>0?0:2;return false;}
  return true;
}

function updateWorker(w,dt){
  const ts=w.tierState, pen=ts.pen, booth=ts.booth, cfg=ts.tier;

  // FEEDER: harvests wheat → delivers to this tier's feeder
  if(w.type==='feeder'){
    if(w.state==='idle'){
      // Need to feed? Go harvest wheat
      if(ts.feedLevel<ts.feedMax*0.8){
        const grown=wheat.tiles.find(t=>t.grown);
        if(grown) w.state='goHarvest';
        else moveTo(w,w.homeX,w.homeY,dt);
      } else moveTo(w,w.homeX,w.homeY,dt);
    }
    if(w.state==='goHarvest'){
      const grown=wheat.tiles.find(t=>t.grown);
      if(grown){
        if(moveTo(w,grown.x,grown.y,dt)){
          wheat.tiles.forEach(t=>{
            if(t.grown&&dist(w,t)<35&&w.stack.length<w.maxStack){
              t.grown=false;t.timer=0;
              w.stack.push({type:'wheat',emoji:'🌾'});sfxCollect();
            }
          });
        }
        if(w.stack.length>=w.maxStack||!wheat.tiles.some(t=>t.grown)){
          if(w.stack.length>0) w.state='goFeed'; else w.state='idle';
        }
      } else{
        if(w.stack.length>0) w.state='goFeed'; else w.state='idle';
      }
    }
    if(w.state==='goFeed'){
      if(moveTo(w,ts.feederX+30,ts.feederY,dt)){
        while(w.stack.length>0&&ts.feedLevel<ts.feedMax){
          w.stack.pop();ts.feedLevel++;
        }
        w.stack=[];w.state='idle';
      }
    }
  }

  // SELLER: collects products from pen → sells at booth to customers
  if(w.type==='seller'){
    if(w.state==='idle'){
      const cust=booth.customers.find(c=>c.state==='waiting');
      if(w.stack.length>0&&cust) w.state='goSell';
      else if(w.stack.length===0&&ts.products.length>0) w.state='goCollect';
      else moveTo(w,w.homeX,w.homeY,dt);
    }
    if(w.state==='goCollect'){
      const p=ts.products[0];
      if(p){
        if(moveTo(w,p.x,p.y,dt)){
          for(let i=ts.products.length-1;i>=0;i--){
            if(dist(w,ts.products[i])<35&&w.stack.length<w.maxStack){
              w.stack.push({type:cfg.id,emoji:cfg.product});
              ts.products.splice(i,1);sfxCollect();
            }
          }
        }
        if(w.stack.length>=w.maxStack||(ts.products.length===0&&w.stack.length>0)) w.state='goSell';
      } else{if(w.stack.length>0)w.state='goSell';else w.state='idle';}
    }
    if(w.state==='goSell'){
      if(moveTo(w,booth.x,booth.y+35,dt)){
        const cust=booth.customers.find(c=>c.state==='waiting');
        if(cust&&w.stack.length>0){
          w.sellTimer+=dt;
          if(w.sellTimer>.2){w.sellTimer=0;
            const item=w.stack.pop();
            addCoins(cfg.value,booth.x,booth.y-10);sfxSell();
            flies.push({x:w.x,y:w.y-20,tx:cust.x,ty:cust.y,emoji:item.emoji,t:0,dur:.3});
            cust.timer++;if(cust.timer>=2||w.stack.length===0){cust.state='served';cust.happy=.8;}
          }
        } else w.state='idle';
      }
    }
  }
}

// ═══════════════════════════════════════
// WORLD BOUNDS — expands as you unlock
// ═══════════════════════════════════════
function getWorldBounds(){
  // Start with wheat field area
  let x1=wheat.x-30, y1=wheat.y-40;
  let x2=wheat.x+wheat.w+200, y2=wheat.y+wheat.h+80;

  // Expand for each active tier
  activeTiers.forEach(ts=>{
    const p=ts.pen, b=ts.booth;
    x1=Math.min(x1, p.x-100);
    y1=Math.min(y1, p.y-50);
    x2=Math.max(x2, b.x+120);
    y2=Math.max(y2, p.y+p.h+80);
  });

  // Expand for visible pads (including next-tier unlock pads)
  allPads.forEach(pad=>{
    if(pad.done)return;
    x1=Math.min(x1, pad.x-30);
    y1=Math.min(y1, pad.y-30);
    x2=Math.max(x2, pad.x+120);
    y2=Math.max(y2, pad.y+100);
  });

  // Expand for global pads
  globalPads.forEach(pad=>{
    if(pad.done)return;
    x1=Math.min(x1, pad.x-30);
    y2=Math.max(y2, pad.y+100);
  });

  return {x1,y1,x2,y2};
}

// MOBILE DETECTION + JOYSTICK
// ═══════════════════════════════════════
const isMobile=isTouchDevice;
let joyActive=false,joyDx=0,joyDy=0,joyTouchId=-1;
let joyCenterX=0,joyCenterY=0; // spawns where you touch
const JOY_R=50;

// ═══════════════════════════════════════
// GAME UPDATE
// ═══════════════════════════════════════
function addCoins(n,x,y){
  n=Math.floor(n*prestigeBonus());
  coins+=n;totalEarned+=n;
  if(x!==undefined){floats.push({x,y:y-20,text:`+${n}🪙`,t:1,color:'#fdd835'});sfxCoin();}
  if(totalEarned>=prestigeCost())showPrestigeBtn=true;
  saveFlash=1; // will save on next interval, but mark dirty
}
let sellCD=0;

function update(dt){
  // ─── Lily movement ───
  let mx=0,my=0;
  if(isMobile){
    // Mobile: only move when joystick is active, constant speed
    if(joyActive){
      const jm=Math.hypot(joyDx,joyDy);
      if(jm>0.15){mx=joyDx/jm;my=joyDy/jm;} // normalize to unit vector
    }
  } else {
    // Desktop: follow cursor
    const ddx=targetX-lily.x,ddy=targetY-lily.y,dd=Math.hypot(ddx,ddy);
    if(dd>8){mx=ddx/dd;my=ddy/dd;mx*=Math.min(1,dd/100);my*=Math.min(1,dd/100);}
  }
  const mag=Math.hypot(mx,my);
  if(mag>0.05){
    const spd=(150+speedLvl*25)*mag;
    lily.x+=(mx/mag)*spd*dt;lily.y+=(my/mag)*spd*dt;
    lily.wf+=dt*10;
    if(Math.abs(mx)>Math.abs(my))lily.dir=mx>0?3:1;else lily.dir=my>0?0:2;
  }
  // Dynamic world bounds — only walk a bit past what's unlocked
  const bounds=getWorldBounds();
  lily.x=clamp(lily.x,bounds.x1-40,bounds.x2+40);
  lily.y=clamp(lily.y,bounds.y1-40,bounds.y2+40);
  // Camera centers on Lily — zoom is applied in drawWorld, so cam is just world position
  camX=lerp(camX,lily.x,dt*5);camY=lerp(camY,lily.y,dt*5);

  // ─── Wheat harvest ───
  const regrow=wheat.regrow/(1+wheatLvl*.5);
  wheat.tiles.forEach(t=>{
    if(!t.grown){t.timer+=dt;if(t.timer>=regrow){t.grown=true;t.timer=0;}return;}
    if(dist(lily,t)<30&&lily.carry()<lily.maxC()){
      t.grown=false;t.timer=0;lily.stack.push({type:'wheat',emoji:'🌾'});sfxCollect();
    }
  });

  // ─── Farm hand workers also harvest ───
  // (handled in their worker AI — we'll add a global farmhand option later)

  // ─── Per-tier update ───
  activeTiers.forEach(ts=>{
    const cfg=ts.tier;

    // Feeder: Lily dumps wheat
    if(dist(lily,{x:ts.feederX+30,y:ts.feederY})<45){
      for(let i=lily.stack.length-1;i>=0;i--){
        if(lily.stack[i].type==='wheat'&&ts.feedLevel<ts.feedMax){
          flies.push({x:lily.x,y:lily.y-20,tx:ts.feederX+30,ty:ts.feederY,emoji:'🌾',t:0,dur:.25});
          lily.stack.splice(i,1);ts.feedLevel++;
        }
      }
    }

    // Feed drains → produce
    if(ts.feedLevel>0){
      ts.feedLevel=Math.max(0,ts.feedLevel-cfg.feedDrain*dt);
      ts.prodTimer+=dt;
      if(ts.prodTimer>=cfg.prodInterval&&ts.products.length<cfg.maxProd){
        ts.prodTimer=0;
        const a=ts.animals[rndInt(0,ts.animals.length-1)];
        if(a) ts.products.push({x:a.x+rnd(-15,15),y:a.y+rnd(10,20)});
      }
    }

    // Animals wander
    ts.animals.forEach(a=>{
      a.timer-=dt;
      if(a.timer<=0){a.tx=rnd(ts.pen.x+25,ts.pen.x+ts.pen.w-25);a.ty=rnd(ts.pen.y+25,ts.pen.y+ts.pen.h-55);a.timer=rnd(2,5);}
      const adx=a.tx-a.x,ady=a.ty-a.y,ad=Math.hypot(adx,ady);
      if(ad>3){a.x+=(adx/ad)*cfg.animalSpeed*dt;a.y+=(ady/ad)*cfg.animalSpeed*dt;}
    });

    // Lily collects products
    for(let i=ts.products.length-1;i>=0;i--){
      if(dist(lily,ts.products[i])<30&&lily.carry()<lily.maxC()){
        const p=ts.products.splice(i,1)[0];
        lily.stack.push({type:cfg.id,emoji:cfg.product});
        flies.push({x:p.x,y:p.y,tx:lily.x,ty:lily.y-30,emoji:cfg.product,t:0,dur:.25});
        sfxCollect();
      }
    }

    // Customers
    ts.custTimer+=dt;
    if(ts.custTimer>cfg.custInterval&&ts.booth.customers.length<5){
      ts.custTimer=0;
      ts.booth.customers.push(mkCustomer(ts.booth,ts.booth.customers.length,ts));
    }
    for(let i=ts.booth.customers.length-1;i>=0;i--){
      const cu=ts.booth.customers[i];
      if(cu.state==='walking'||cu.state==='waiting'){cu.tx=ts.booth.x+50;cu.ty=ts.booth.y+25+i*38;}
      const cdx=cu.tx-cu.x,cdy=cu.ty-cu.y,cd=Math.hypot(cdx,cdy);
      if(cd>2){cu.x+=(cdx/cd)*120*dt;cu.y+=(cdy/cd)*120*dt;}
      else if(cu.state==='walking')cu.state='waiting';
      if(cu.state==='waiting'){cu.patience-=dt;if(cu.patience<=0){cu.state='leaving';cu.tx=ts.booth.x+260;}}
      if(cu.state==='served'){cu.happy-=dt;if(cu.happy<=0){cu.state='leaving';cu.tx=ts.booth.x+260;}}
      if(cu.state==='leaving'&&dist(cu,{x:cu.tx,y:cu.ty})<5)ts.booth.customers.splice(i,1);
    }

    // Lily sells at booth
    const near=dist(lily,{x:ts.booth.x,y:ts.booth.y+35})<50;
    const cust=ts.booth.customers.find(c=>c.state==='waiting');
    if(near&&cust){
      // Sell matching product
      const idx=lily.stack.findIndex(s=>s.type===cfg.id);
      if(idx>=0){
        sellCD+=dt;
        if(sellCD>.18){sellCD=0;
          const item=lily.stack.splice(idx,1)[0];
          addCoins(cfg.value,ts.booth.x,ts.booth.y-10);sfxSell();
          flies.push({x:lily.x,y:lily.y-20,tx:cust.x,ty:cust.y,emoji:item.emoji,t:0,dur:.3});
          cust.timer++;if(cust.timer>=2){cust.state='served';cust.happy=.8;}
        }
      }
    }

    // Update workers (no auto drop-off from Lily)
    ts.workers.forEach(w=>updateWorker(w,dt));
  });

  // ─── World pads — 1s hover before each charge cycle ───
  const HOVER_REQ=1;
  allPads.forEach(pad=>{
    if(pad.done)return;
    const cx=pad.x+40,cy=pad.y+30;
    const onPad=dist(lily,{x:cx,y:cy})<50;
    if(onPad){
      pad.hoverTime=(pad.hoverTime||0)+dt;
      if(pad.hoverTime>=HOVER_REQ&&coins>0){
        const drain=Math.min(Math.ceil(pad.cost*dt*2.5),coins,pad.cost-pad.paid);
        if(drain>0){coins-=drain;pad.paid+=drain;
          if(pad.paid>=pad.cost){
            sfxUnlock();
            try{if(typeof pad.action==='function')pad.action(pad);}catch(e){console.error('Pad action error:',e);}
            if(!pad.repeatable)pad.done=true;
            else pad.hoverTime=0;
            floats.push({x:cx,y:cy-20,text:'✓',t:1.5,color:'#76ff03'});
            saveGame(); // save immediately after purchase
          }
        }
      }
    } else {
      pad.hoverTime=0;
    }
  });

  // ─── Auto-save + leaderboard sync ───
  saveTimer+=dt;
  if(saveTimer>=SAVE_INTERVAL){saveTimer=0;saveGame();}
  lbTimer+=dt;
  if(lbTimer>=LB_REFRESH){lbTimer=0;fetchLeaderboard();pushStats();}

  // ─── Animate ───
  flies.forEach(f=>{f.t+=dt;const p=Math.min(1,f.t/f.dur);f.x=lerp(f.x,f.tx,p*.4);f.y=lerp(f.y,f.ty,p*.4);f.y-=(1-p)*50*dt});
  flies=flies.filter(f=>f.t<f.dur);
  floats.forEach(f=>{f.t-=dt;f.y-=30*dt});
  floats=floats.filter(f=>f.t>0);
}

function drawChar(x,y,dir,wf,body,hat,hair){
  G.save();G.translate(x,y);
  const b=Math.sin(wf)*2;
  G.fillStyle='rgba(0,0,0,0.15)';G.beginPath();G.ellipse(0,18,13,4,0,0,Math.PI*2);G.fill();
  G.fillStyle=body;G.beginPath();G.moveTo(-9,b);G.lineTo(-12,18);G.lineTo(12,18);G.lineTo(9,b);G.closePath();G.fill();
  // Arms
  G.strokeStyle=body;G.lineWidth=3;G.lineCap='round';
  G.beginPath();G.moveTo(-9,3+b);G.lineTo(-14,12+b);G.stroke();
  G.beginPath();G.moveTo(9,3+b);G.lineTo(14,12+b);G.stroke();
  G.fillStyle='#ffcc80';G.beginPath();G.arc(0,-7+b,10,0,Math.PI*2);G.fill();
  G.fillStyle=hair||'#5d4037';G.beginPath();G.arc(0,-12+b,10,Math.PI,Math.PI*2);G.fill();
  // Side hair
  G.beginPath();G.arc(-10,-5+b,4,0,Math.PI*2);G.fill();
  G.beginPath();G.arc(10,-5+b,4,0,Math.PI*2);G.fill();
  G.fillStyle='#333';G.beginPath();G.arc(-3.5,-7+b,1.5,0,Math.PI*2);G.fill();
  G.beginPath();G.arc(3.5,-7+b,1.5,0,Math.PI*2);G.fill();
  G.beginPath();G.arc(0,-4+b,3,.2,Math.PI-.2);G.strokeStyle='#c62828';G.lineWidth=1;G.stroke();
  if(hat){G.fillStyle=hat;G.beginPath();G.ellipse(0,-16+b,13,3.5,0,0,Math.PI*2);G.fill();
    G.fillRect(-6,-24+b,12,9);G.beginPath();G.arc(0,-24+b,6,Math.PI,Math.PI*2);G.fill();}
  G.restore();
}

function drawCustomer(cu){
  // Bounce when happy
  const by=cu.state==='served'?Math.sin(cu.happy*20)*5:0;
  // Foot tap when waiting impatiently
  const tap=cu.state==='waiting'&&cu.patience<cu.maxPatience*.5?Math.sin(Date.now()*.01)*1.5:0;
  drawChar(cu.x,cu.y+by+tap,0,cu.state==='walking'?Date.now()*.008:0,cu.outfit,cu.hat,cu.hair);

  if(cu.state==='waiting'){

  }
  // Happy emoji
  if(cu.state==='served'){G.font='14px serif';G.textAlign='center';G.fillText('😊',cu.x,cu.y-25+by);}
}

function drawPad(pad){
  if(pad.done)return;
  const cx=pad.x+40,cy=pad.y+30,r=pad.size/2+8;
  const pct=pad.paid/pad.cost;
  const pulse=.6+Math.sin(Date.now()*.004)*.3;
  const near=dist(lily,{x:cx,y:cy})<55;
  const hovering=(pad.hoverTime||0)>=1;

  // Outer glow when hovering and draining
  if(near&&hovering&&coins>0){
    G.beginPath();G.arc(cx,cy,r+12,0,Math.PI*2);
    G.fillStyle=`rgba(253,216,53,${pulse*.3})`;G.fill();
  }

  // Dark circle
  G.beginPath();G.arc(cx,cy,r,0,Math.PI*2);G.fillStyle='rgba(0,0,0,0.55)';G.fill();

  // Coin progress ring (yellow)
  if(pct>0){
    G.beginPath();G.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
    G.strokeStyle='#fdd835';G.lineWidth=5;G.lineCap='round';G.stroke();
  }
  // Unfilled ring
  G.beginPath();G.arc(cx,cy,r,-Math.PI/2+Math.PI*2*pct,-Math.PI/2+Math.PI*2);
  G.strokeStyle='rgba(255,255,255,0.12)';G.lineWidth=5;G.stroke();

  // Hover warmup ring (white, shows 0-1s progress before coins drain)
  if(near&&!hovering&&(pad.hoverTime||0)>0){
    const warmPct=(pad.hoverTime||0)/1;
    G.beginPath();G.arc(cx,cy,r+4,-Math.PI/2,-Math.PI/2+Math.PI*2*warmPct);
    G.strokeStyle='rgba(255,255,255,0.5)';G.lineWidth=3;G.lineCap='round';G.stroke();
  }

  // Icon
  G.font=`${pad.size}px serif`;G.textAlign='center';G.textBaseline='middle';
  G.globalAlpha=.35+pct*.65;G.fillText(pad.icon,cx,cy-1);G.globalAlpha=1;

  // Label
  G.font='bold 10px sans-serif';G.fillStyle='#fff';G.textAlign='center';
  G.fillText(pad.label+(pad.level>0?` ${pad.level}`:''),cx,cy+r+12);
  const rem=pad.cost-Math.floor(pad.paid);
  G.font='bold 11px sans-serif';G.fillStyle='#fdd835';
  G.fillText(`${rem}🪙`,cx,cy+r+24);
  if(near&&pct<1)for(let i=0;i<3;i++){const a=Date.now()*.008+i*2.09;
    G.beginPath();G.arc(cx+Math.cos(a)*(r+4),cy+Math.sin(a)*(r+4),2,0,Math.PI*2);
    G.fillStyle=`rgba(253,216,53,${pulse})`;G.fill();}
}

function drawWorld(){
  G.save();
  G.translate(W/2,H/2);
  G.scale(camZoom,camZoom);
  G.translate(-camX,-camY);

  // Ground
  G.fillStyle='#7cb342';G.fillRect(-500,-500,3000,2500);
  G.fillStyle='rgba(0,0,0,0.025)';
  for(let x=-500;x<2500;x+=40)for(let y=-500;y<2000;y+=40)
    if((x+y)%80===0)G.fillRect(x,y,40,40);

  // Paths — fully connected: wheat → highway → each feeder, pen → booth
  G.fillStyle='#a1887f';
  const PATH_W=24;
  const wheatMidY=wheat.y+wheat.h/2;

  if(activeTiers.length>0){
    // Find full vertical extent
    let topY=wheatMidY;
    let botY=wheatMidY;
    activeTiers.forEach(ts=>{
      topY=Math.min(topY,ts.feederY);
      botY=Math.max(botY,ts.feederY);
    });
    // Vertical highway — covers from wheat down to lowest feeder
    G.fillRect(HW_X-PATH_W/2,topY-PATH_W/2,PATH_W,botY-topY+PATH_W+30);
  }

  // Wheat field to highway (horizontal)
  G.fillRect(wheat.x+wheat.w,wheatMidY-PATH_W/2,HW_X-wheat.x-wheat.w+PATH_W/2,PATH_W);

  // Connect highway to wheat at the right Y
  if(activeTiers.length>0){
    const firstFeederY=activeTiers[0].feederY;
    if(Math.abs(firstFeederY-wheatMidY)>PATH_W){
      // Vertical stub from wheat junction to first feeder level
      const y1=Math.min(wheatMidY,firstFeederY);
      const y2=Math.max(wheatMidY,firstFeederY);
      G.fillRect(HW_X-PATH_W/2,y1,PATH_W,y2-y1+PATH_W);
    }
  }

  activeTiers.forEach(ts=>{
    // Horizontal: highway to feeder
    G.fillRect(HW_X-PATH_W/2,ts.feederY-PATH_W/2,ts.feederX-HW_X+PATH_W,PATH_W);
    // Horizontal: pen to booth
    const pathY=ts.pen.y+ts.pen.h/2;
    G.fillRect(ts.pen.x+ts.pen.w,pathY-PATH_W/2,ts.booth.x-ts.pen.x-ts.pen.w,PATH_W);
  });

  // Wheat field
  drawArea(wheat.x,wheat.y,wheat.w,wheat.h,'#8d6e63','🌾 Wheat Field');
  wheat.tiles.forEach(t=>{
    G.font='26px serif';G.textAlign='center';G.textBaseline='middle';
    if(t.grown){const s=Math.sin(Date.now()*.003+t.x*.1)*2;G.fillText('🌾',t.x+s,t.y);}
    else{G.globalAlpha=.3;G.fillText('🌱',t.x,t.y);G.globalAlpha=1;
      const p=t.timer/(wheat.regrow/(1+wheatLvl*.5));
      G.fillStyle='#8bc34a';G.fillRect(t.x-10,t.y+15,20*p,3);}
  });

  // Tier areas
  activeTiers.forEach(ts=>{
    const cfg=ts.tier,pen=ts.pen;
    const penColors=['#a5d6a7','#c8e6c9','#ffe0b2','#d1c4e9','#fff9c4'];
    drawArea(pen.x,pen.y,pen.w,pen.h,penColors[ts.tierIdx%5],`${cfg.animal} ${cfg.name}`);
    drawFeeder(ts.feederX,ts.feederY,ts.feedLevel,ts.feedMax);

    G.font=`${cfg.id==='bee'?22:28}px serif`;G.textAlign='center';G.textBaseline='middle';
    ts.animals.forEach(a=>{const b=Math.sin(Date.now()*.006+a.x)*2;G.fillText(cfg.animal,a.x,a.y+b);});

    G.font='20px serif';
    ts.products.forEach(p=>{const b=Math.sin(Date.now()*.005+p.x+p.y);G.fillText(cfg.product,p.x,p.y+b);});

    // Booth
    const bth=ts.booth;
    G.fillStyle='#795548';G.fillRect(bth.x-25,bth.y-20,50,60);
    G.fillStyle='#ffab40';G.fillRect(bth.x-22,bth.y-17,44,24);
    G.font='20px serif';G.textAlign='center';G.textBaseline='middle';
    G.fillText(cfg.product,bth.x,bth.y-5);
    G.font='9px sans-serif';G.fillStyle='#fff';G.fillText(cfg.prodName+' Shop',bth.x,bth.y+30);

    // Customers (drawn as characters)
    bth.customers.forEach(cu=>drawCustomer(cu));

    // Workers
    ts.workers.forEach(w=>{
      const cols=w.type==='seller'?['#1565c0','#f44336','#3e2723']:['#2e7d32','#795548','#5d4037'];
      drawChar(w.x,w.y,w.dir,w.wf,cols[0],cols[1],cols[2]);
      drawStack(w.x,w.y,w.stack,14);
      G.font='16px serif';G.textAlign='center';
      G.fillText(w.type==='seller'?'🏪':'🌾',w.x,w.y-24-(w.stack.length>0?w.stack.length*10+8:0));
    });
  });

  // All pads
  allPads.forEach(drawPad);

  // Lily — hat color changes with prestige
  drawChar(lily.x,lily.y,lily.dir,lily.wf,'#e91e63',lilyHat(),'#5d4037');
  drawStack(lily.x,lily.y,lily.stack);

  // World boundary fence
  const b=getWorldBounds();
  G.strokeStyle='#5d4037';G.lineWidth=4;G.setLineDash([8,8]);
  G.strokeRect(b.x1-20,b.y1-20,b.x2-b.x1+40,b.y2-b.y1+40);
  G.setLineDash([]);
  // Fence posts
  G.fillStyle='#4e342e';
  for(let fx=b.x1-20;fx<=b.x2+20;fx+=50){G.fillRect(fx-3,b.y1-26,6,12);G.fillRect(fx-3,b.y2+14,6,12);}
  for(let fy=b.y1-20;fy<=b.y2+20;fy+=50){G.fillRect(b.x1-26,fy-3,12,6);G.fillRect(b.x2+14,fy-3,12,6);}

  // Flying items
  flies.forEach(f=>{G.font='16px serif';G.textAlign='center';G.textBaseline='middle';G.fillText(f.emoji,f.x,f.y);});
  // Floating texts
  floats.forEach(f=>{G.font='bold 15px sans-serif';G.fillStyle=f.color;G.textAlign='center';G.globalAlpha=Math.min(1,f.t*2);G.fillText(f.text,f.x,f.y);G.globalAlpha=1;});

  G.restore();
}

// ═══════════════════════════════════════
// HUD
// ═══════════════════════════════════════
let prestigeBtnHit=null; // {x,y,w,h} for click detection

function drawHUD(){
  G.fillStyle='rgba(62,39,35,0.88)';G.fillRect(0,0,W,42);
  G.font='bold 22px sans-serif';G.fillStyle='#fdd835';G.textAlign='left';
  const coinText=`🪙 ${coins}`;
  G.fillText(coinText,14,30);
  if(prestigeStars>0){
    const coinW=G.measureText(coinText).width;
    G.font='bold 13px sans-serif';G.fillStyle='#ce93d8';
    G.fillText(`x${prestigeBonus().toFixed(2)} ${'⭐'.repeat(Math.min(prestigeStars,5))}`,20+coinW,30);
  }

  G.font='bold 15px sans-serif';G.fillStyle='#ffcc80';G.textAlign='center';G.fillText("Lily's Farm",W/2,17);
  G.font='12px sans-serif';G.fillStyle='#aaa';G.fillText(`Carry: ${lily.carry()}/${lily.maxC()}`,W/2,35);

  // Prestige button in top bar
  if(showPrestigeBtn){
    const bw=140,bh=28;
    const bx=W/2+80,by=7;
    const pulse=.7+Math.sin(Date.now()*.005)*.3;
    G.fillStyle=`rgba(156,39,176,${pulse})`;
    G.beginPath();G.roundRect(bx,by,bw,bh,6);G.fill();
    G.strokeStyle='#e1bee7';G.lineWidth=1.5;G.stroke();
    G.font='bold 12px sans-serif';G.fillStyle='#fff';G.textAlign='center';
    G.fillText(`⭐ Prestige ${prestigeStars+1}`,bx+bw/2,by+18);
    prestigeBtnHit={x:bx,y:by,w:bw,h:bh};
  }

  // Save indicator
  if(saveFlash>0){
    saveFlash-=0.02;
    G.font='10px sans-serif';G.textAlign='right';
    G.fillStyle=lastSaveOk?`rgba(76,175,80,${saveFlash})`:`rgba(244,67,54,${saveFlash})`;
    G.fillText(lastSaveOk?'✓ saved':'✗ save failed',W-14,14);
  }

  // Stack summary
  const counts={};
  lily.stack.forEach(s=>{counts[s.emoji]=(counts[s.emoji]||0)+1;});
  G.font='14px sans-serif';G.textAlign='right';G.fillStyle='#fff';
  let ix=W-14;
  Object.entries(counts).forEach(([emoji,n])=>{G.fillText(`${emoji}${n}`,ix,30);ix-=50;});

  // Tutorial
  if(totalEarned===0){
    G.font=`bold ${isMobile?13:15}px sans-serif`;G.fillStyle='#fff';G.textAlign='center';
    G.globalAlpha=.5+Math.sin(Date.now()*.003)*.5;
    let h='';
    const verb=isMobile?'Move Lily to':'Move cursor to';
    if(lily.carry()===0)h=`${verb} the wheat field!`;
    else if(lily.stack.some(s=>s.type==='wheat'))h=`${verb} the chicken feeder!`;
    else if(activeTiers[0].feedLevel>0&&activeTiers[0].products.length===0)h='Chickens are eating... eggs coming!';
    else if(activeTiers[0].products.length>0)h='Collect eggs, then sell at the egg shop!';
    if(h)G.fillText(h,W/2,62);
    G.globalAlpha=1;
  }

  // Prestige button — no longer drawn here, moved to top bar
  prestigeBtnHit=null;

  // Mobile joystick — only visible when active
  if(isMobile&&joyActive){
    G.globalAlpha=.2;G.fillStyle='#fff';
    G.beginPath();G.arc(joyCenterX,joyCenterY,JOY_R,0,Math.PI*2);G.fill();
    G.globalAlpha=.5;G.fillStyle='#fff';
    G.beginPath();G.arc(joyCenterX+joyDx*JOY_R*.7,joyCenterY+joyDy*JOY_R*.7,20,0,Math.PI*2);G.fill();
    G.globalAlpha=1;
  }

  // ─── Leaderboard (top-right corner) ───
  if(leaderboard.length>0&&playerName){
    const lbW=lbExpanded?220:140, lbH=lbExpanded?Math.min(30+leaderboard.length*22,300):80;
    const lbX=W-lbW-8, lbY=48;
    G.fillStyle='rgba(62,39,35,0.85)';
    G.beginPath();G.roundRect(lbX,lbY,lbW,lbH,8);G.fill();
    G.font='bold 11px sans-serif';G.fillStyle='#ffcc80';G.textAlign='left';
    G.fillText('🏆 Leaderboard',lbX+8,lbY+16);
    G.font='9px sans-serif';G.fillStyle='#aaa';G.textAlign='right';
    G.fillText(lbExpanded?'▲ click':'▼ click',lbX+lbW-8,lbY+16);

    const shown=lbExpanded?leaderboard.slice(0,12):leaderboard.slice(0,3);
    shown.forEach((p,i)=>{
      const y=lbY+30+i*(lbExpanded?22:16);
      const isMe=p.name.toLowerCase()===playerName.toLowerCase();
      G.font=`${isMe?'bold ':''}${lbExpanded?12:10}px sans-serif`;
      G.fillStyle=isMe?'#fdd835':'#fff';G.textAlign='left';
      G.fillText(`${i+1}. ${'⭐'.repeat(Math.min(p.prestige,5))} ${p.name}`,lbX+8,y);
      if(lbExpanded){
        G.font='10px sans-serif';G.fillStyle='#aaa';G.textAlign='right';
        G.fillText(`${p.tiersUnlocked} tiers · ${p.lifetimeEarned||0}🪙`,lbX+lbW-8,y);
      }
    });
    lbHitBox={x:lbX,y:lbY,w:lbW,h:lbH};
  } else lbHitBox=null;

}

let lbHitBox=null;

let namePromptBtn=null; // not used anymore but kept for compat

// Real HTML overlay for name input
const nameOverlay=document.getElementById('nameOverlay');
const nameInEl=document.getElementById('nameIn');
const nameBtnEl=document.getElementById('nameBtn');

function submitName(){
  const val=nameInEl.value.trim();
  if(val.length<2)return;
  playerName=val;nameInput=val;
  localStorage.setItem('lilys_farm_name',playerName);
  showNamePrompt=false;
  nameOverlay.style.display='none';
  fetchLeaderboard();pushStats();
}

nameBtnEl.addEventListener('click',submitName);
nameInEl.addEventListener('keydown',e=>{if(e.key==='Enter')submitName();});

if(showNamePrompt){nameOverlay.style.display='flex';setTimeout(()=>nameInEl.focus(),200);}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
function s2w(sx,sy){
  return{x:(sx-W/2)/camZoom+camX, y:(sy-H/2)/camZoom+camY};
}

// Save when leaving/switching tabs (critical for mobile)
document.addEventListener('visibilitychange',()=>{if(document.hidden)saveGame();});
window.addEventListener('beforeunload',()=>saveGame());
window.addEventListener('pagehide',()=>saveGame());

// Desktop: cursor follow
C.addEventListener('mousemove',e=>{const w=s2w(e.clientX,e.clientY);targetX=w.x;targetY=w.y;});

// Click: prestige button, leaderboard toggle, name submit
C.addEventListener('click',e=>{
  const x=e.clientX,y=e.clientY;
  if(showNamePrompt)return;
  // Leaderboard toggle
  if(lbHitBox&&x>=lbHitBox.x&&x<=lbHitBox.x+lbHitBox.w&&y>=lbHitBox.y&&y<=lbHitBox.y+lbHitBox.h){
    lbExpanded=!lbExpanded;return;
  }
  // Prestige
  if(prestigeBtnHit){
    const b=prestigeBtnHit;
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){doPrestige();}
  }
});

// Keyboard is handled by the HTML input element — no need for manual keydown

// Mobile: touch anywhere = joystick spawns there. Two fingers = zoom.
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(showNamePrompt)return;

  // Two fingers = start pinch zoom
  if(e.touches.length===2){
    joyActive=false;joyDx=0;joyDy=0;joyTouchId=-1;
    const t1=e.touches[0],t2=e.touches[1];
    pinchDist=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
    return;
  }

  const t=e.changedTouches[0];
  const x=t.clientX,y=t.clientY;

  // UI hits
  if(lbHitBox&&x>=lbHitBox.x&&x<=lbHitBox.x+lbHitBox.w&&y>=lbHitBox.y&&y<=lbHitBox.y+lbHitBox.h){
    lbExpanded=!lbExpanded;return;
  }
  if(prestigeBtnHit){
    const b=prestigeBtnHit;
    if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){doPrestige();return;}
  }

  // Joystick spawns wherever you touch
  joyActive=true;joyTouchId=t.identifier;
  joyCenterX=x;joyCenterY=y;
  joyDx=0;joyDy=0;
});

C.addEventListener('touchmove',e=>{
  e.preventDefault();

  // Pinch zoom (two fingers)
  if(e.touches.length===2){
    const t1=e.touches[0],t2=e.touches[1];
    const d=Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
    if(pinchDist>10){
      const ratio=d/pinchDist;
      // Dampen the zoom to prevent wild jumps
      const dampedRatio=1+(ratio-1)*0.5;
      camZoom=clamp(camZoom*dampedRatio,camZoomMin(),CAM_ZOOM_MAX);
    }
    pinchDist=d;
    return;
  }

  // Joystick drag
  for(const t of e.changedTouches){
    if(joyActive&&t.identifier===joyTouchId){
      const dx=t.clientX-joyCenterX,dy=t.clientY-joyCenterY;
      const maxD=JOY_R;
      joyDx=clamp(dx/maxD,-1,1);
      joyDy=clamp(dy/maxD,-1,1);
    }
  }
});

C.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===joyTouchId){joyActive=false;joyDx=0;joyDy=0;joyTouchId=-1;}
  }
  if(e.touches.length<2)pinchDist=0;
});
C.addEventListener('touchcancel',()=>{joyActive=false;joyDx=0;joyDy=0;joyTouchId=-1;pinchDist=0;});

// Scroll wheel zoom (desktop)
C.addEventListener('wheel',e=>{
  e.preventDefault();
  camZoom=clamp(camZoom*(e.deltaY>0?0.92:1.08),camZoomMin(),CAM_ZOOM_MAX);
},{passive:false});

// ═══════════════════════════════════════
// LOOP
// ═══════════════════════════════════════
let lt=0;
function loop(t){
  const dt=Math.min((t-lt)/1000,.05);lt=t;
  if(!showNamePrompt) update(dt);
  G.clearRect(0,0,W,H);
  if(!showNamePrompt){drawWorld();drawHUD();}
  else{G.fillStyle='#7cb342';G.fillRect(0,0,W,H);}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
